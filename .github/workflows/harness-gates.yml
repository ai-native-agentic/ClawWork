name: harness-gates

on:
  pull_request:
  push:

jobs:
  harness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install gate tools
        run: |
          python -m pip install --upgrade pip
          pip install black ruff mypy pyyaml
      - name: Run harness gates
        run: ./.harness/run-gates.sh --gates a,c
